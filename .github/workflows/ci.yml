name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CI: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -m1 '<VersionPrefix>' Version.props | sed -E 's/.*<VersionPrefix>([^<]+)<\/VersionPrefix>.*/\1/')-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore
        run: dotnet restore QueryDuck.slnx

      - name: Build
        run: dotnet build QueryDuck.slnx --configuration ${{ env.CONFIGURATION }} --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Format check
        run: dotnet format QueryDuck.slnx --verify-no-changes

      - name: Test with coverage
        run: dotnet test QueryDuck.slnx --configuration ${{ env.CONFIGURATION }} --no-build --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            artifacts/coverage/
            artifacts/test-results/

  pack-nuget:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -m1 '<VersionPrefix>' Version.props | sed -E 's/.*<VersionPrefix>([^<]+)<\/VersionPrefix>.*/\1/')-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack NuGet packages
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          REPOSITORY_COMMIT: ${{ github.sha }}
        run: |
          chmod +x build/pack.sh build/verify-packages.sh
          dotnet restore QueryDuck.slnx
          dotnet pack QueryDuck.slnx \
            --configuration ${{ env.CONFIGURATION }} \
            --output artifacts/nuget \
            --no-restore \
            /p:Version="$VERSION" \
            /p:ContinuousIntegrationBuild=true \
            /p:RepositoryUrl="$REPOSITORY_URL" \
            /p:RepositoryCommit="$REPOSITORY_COMMIT"
          ./build/verify-packages.sh artifacts/nuget
          ls -la artifacts/nuget

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg

  rider-plugin:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Rider plugin distribution
        working-directory: rider-plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Upload Rider plugin
        uses: actions/upload-artifact@v4
        with:
          name: queryduck-rider-plugin
          path: rider-plugin/build/distributions/*.zip

  vsix:
    needs: build-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore VS extension
        run: dotnet restore vs-extension/QueryDuck.VisualStudio/QueryDuck.VisualStudio.csproj

      - name: Build VSIX
        run: dotnet build vs-extension/QueryDuck.VisualStudio/QueryDuck.VisualStudio.csproj --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: queryduck-vsix
          path: vs-extension/QueryDuck.VisualStudio/bin/${{ env.CONFIGURATION }}/*.vsix

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [pack-nuget, rider-plugin, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: release/nuget

      - name: Download Rider plugin
        uses: actions/download-artifact@v4
        with:
          name: queryduck-rider-plugin
          path: release/rider-plugin

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: queryduck-vsix
          path: release/vsix

      - name: Create GitHub release assets bundle
        run: |
          mkdir -p release/bundle
          cp release/nuget/* release/bundle/
          cp release/rider-plugin/* release/bundle/
          cp release/vsix/* release/bundle/
          ls -la release/bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/bundle/*
          generate_release_notes: true

  publish-nuget:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: pack-nuget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Push to NuGet.org
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Skip NuGet.org publish without API key
        if: env.NUGET_API_KEY == ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: echo "NUGET_API_KEY secret not configured; NuGet.org publish skipped."
